name: terraform deploy reusable

on:
  workflow_call:
    inputs:
      aws-region:
        required: true
        type: string
      role-to-assume:
        required: true
        type: string
      gitops-bot-app-id:
        required: true
        type: string
      terraform-directory:
        required: true
        type: string
      var-file:
        required: true
        type: string

    secrets:
      GITOPS_BOT_PRIVATE_KEY:
        required: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Configure GitHub app credentials and checkout main branch
      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ inputs.gitops-bot-app-id }}
          private-key: ${{ secrets.GITOPS_BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ steps.generate-token.outputs.token }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role-to-assume }}
          role-session-name: push-to-ecr
          aws-region: ${{ inputs.aws-region }}

      # Step 3: Install Terraform
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      # Step 4: Terraform Init
      - name: Terraform Init
        working-directory: ${{ inputs.terraform-directory }}
        run: terraform init -reconfigure

      # Step 5: Terraform Plan
      - name: Terraform Plan
        working-directory: ${{ inputs.terraform-directory }}
        run: terraform plan -var-file=${{ inputs.var-file }}

      # Step 6: Terraform Apply
      - name: Terraform Apply
        working-directory: ${{ inputs.terraform-directory }}
        run: terraform apply -var-file=${{ inputs.var-file }} -auto-approve
